version: "3.9"

networks:
  raft-net:
    driver: bridge

services:

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    networks:
      - raft-net

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - REPLICA1_URL=http://replica1:9001
      - REPLICA2_URL=http://replica2:9002
      - REPLICA3_URL=http://replica3:9003
    depends_on:
      - replica1
      - replica2
      - replica3
    volumes:
      - ./gateway:/app   # bind mount for hot reload
    networks:
      - raft-net

  replica1:
    build: ./replica1
    ports:
      - "9001:9000"
    environment:
      - REPLICA_ID=replica1
      - PORT=9000
      - PEERS=http://replica2:9000,http://replica3:9000
    volumes:
      - ./replica1:/app  # bind mount for hot reload
    networks:
      - raft-net

  replica2:
    build: ./replica2
    ports:
      - "9002:9000"
    environment:
      - REPLICA_ID=replica2
      - PORT=9000
      - PEERS=http://replica1:9000,http://replica3:9000
    volumes:
      - ./replica2:/app
    networks:
      - raft-net

  replica3:
    build: ./replica3
    ports:
      - "9003:9000"
    environment:
      - REPLICA_ID=replica3
      - PORT=9000
      - PEERS=http://replica1:9000,http://replica2:9000
    volumes:
      - ./replica3:/app
    networks:
      - raft-net
