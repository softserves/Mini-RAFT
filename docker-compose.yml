version: "3.9"

networks:
  raft-net:
    driver: bridge

services:

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    networks:
      - raft-net

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - REPLICA1_URL=http://replica1:9000
      - REPLICA2_URL=http://replica2:9000
      - REPLICA3_URL=http://replica3:9000
    depends_on:
      - replica1
      - replica2
      - replica3
    volumes:
      - ./gateway:/app   # bind mount for hot reload
    networks:
      - raft-net

  replica1:
    build: ./replica
    ports:
      - "9001:9000"
    environment:
      - REPLICA_ID=replica1
      - PORT=9000
      - PEERS=replica2:9000,replica3:9000
    volumes:
      - ./replica:/app  # bind mount for hot reload
    networks:
      - raft-net

  replica2:
    build: ./replica
    ports:
      - "9002:9000"
    environment:
      - REPLICA_ID=replica2
      - PORT=9000
      - PEERS=replica1:9000,replica3:9000
    volumes:
      - ./replica:/app
    networks:
      - raft-net

  replica3:
    build: ./replica
    ports:
      - "9003:9000"
    environment:
      - REPLICA_ID=replica3
      - PORT=9000
      - PEERS=replica1:9000,replica2:9000
    volumes:
      - ./replica:/app
    networks:
      - raft-net
